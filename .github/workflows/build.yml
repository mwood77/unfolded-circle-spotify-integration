# Triggered by merges to main to build a distribution binary, Docker image, and create a release.
name: "Build & Release"

"on":
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".gitignore"
      - "LICENSE"
      - "README.md"

env:
  INTG_NAME: spotify
  # Python version to use in the builder image. See https://hub.docker.com/r/unfoldedcircle/r2-pyinstaller for possible versions.
  PYTHON_VER: 3.11.12-0.3.0

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-24.04
    #Save version to env output variable to be able to use it in the following release job as a tag
    outputs:
      version: ${{ steps.get-version-and-id.outputs.VERSION }}
      driver_id: ${{ steps.get-version-and-id.outputs.DRIVER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and id
        #Id needed for env output variable
        id: get-version-and-id
        run: |
          VERSION=$(jq .version -r driver.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "driver.json does not contain a valid version" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Extract just the base name from driver_id to avoid duplication
          DRIVER_BASE=$(jq .driver_id -r driver.json | sed 's/^uc-intg-//')
          echo "DRIVER_ID=$DRIVER_BASE" >> $GITHUB_ENV
          # Save to Github output to later use it in Create Release job
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "DRIVER_ID=$DRIVER_BASE" >> $GITHUB_OUTPUT

      - name: Ensure release version is new
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists. Bump driver.json version before merging to main." >&2
            exit 1
          fi

      - name: Prepare driver metadata
        run: |
          mkdir -p build_metadata
          jq --arg version "${VERSION}" --arg release_date "$(date -u +%F)" \
            '.version = $version | .release_date = $release_date' \
            driver.json > build_metadata/driver.json
          cat build_metadata/driver.json

      - name: Build
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system-arm binfmt-support qemu-user-static
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker run --rm --name builder \
            --platform=aarch64 \
            --user=$(id -u):$(id -g) \
            -v ${GITHUB_WORKSPACE}:/workspace \
            docker.io/unfoldedcircle/r2-pyinstaller:${PYTHON_VER} \
            bash -c \
            "cd /workspace && \
              python -m pip install -r requirements.txt && \
              pyinstaller --clean --onedir --name driver \
                --add-data build_metadata/driver.json:. \
                --collect-all zeroconf \
                --collect-all ucapi \
                --collect-all ucapi_framework \
                --hidden-import uc_intg_${INTG_NAME}.driver \
                --hidden-import uc_intg_${INTG_NAME}.device \
                --hidden-import uc_intg_${INTG_NAME}.config \
                --hidden-import uc_intg_${INTG_NAME}.client \
                --hidden-import uc_intg_${INTG_NAME}.media_player \
                --hidden-import uc_intg_${INTG_NAME}.remote \
                --hidden-import uc_intg_${INTG_NAME}.browser \
                --hidden-import uc_intg_${INTG_NAME}.setup \
                --hidden-import uc_intg_${INTG_NAME}.select \
                --hidden-import uc_intg_${INTG_NAME}.sensor \
                --hidden-import uc_intg_${INTG_NAME}.discovery \
                --paths . \
                uc_intg_${INTG_NAME}/__main__.py"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/bin
          mv dist/driver/* artifacts/bin/
          cp build_metadata/driver.json artifacts/driver.json
          echo "ARTIFACT_NAME=${{ env.DRIVER_ID }}-${{ env.VERSION }}-aarch64" >> $GITHUB_ENV
          
      - name: Create upload artifact archive
        shell: bash
        run: | 
          tar czvf ${{ env.ARTIFACT_NAME }}.tar.gz -C ${GITHUB_WORKSPACE}/artifacts .
          ls -lah
          
      - uses: actions/upload-artifact@v4
        id: upload_artifact
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 3
            
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/unfolded-circle-spotify-integration
          tags: |
            type=raw,value=${{ needs.build.outputs.version }}
            type=raw,value=v${{ needs.build.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
            
  release:
    name: Create Release
    runs-on: ubuntu-24.04
    needs: [build, docker]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Extract build archives from downloaded files
        run: |
          ls -R downloaded-artifacts
          find downloaded-artifacts -name "*.tar.gz" -exec mv {} ./ \;

      - name: Create hash file
        run: |
          for filename in *.tar.gz; do echo "sha256  `sha256sum $filename`" >> ${{needs.build.outputs.driver_id}}.hash; done;

      - name: Create release notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          {
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)"
            else
              git log --pretty=format:"- %s (%h)"
            fi
            echo
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.build.outputs.version }}" \
            --target "${GITHUB_SHA}" \
            --title "v${{ needs.build.outputs.version }}" \
            --notes-file release-notes.md \
            *.tar.gz \
            "${{ needs.build.outputs.driver_id }}.hash"
